<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- POWERFUL SEO 4.0 -->
    <title>Quick Revision & High-Yield Medical Notes | Alpotus</title>
    <meta name="description" content="Prepare for USMLE, NEET PG, and PLAB with high-yield medical revision tables. Rapid review notes on vitamins, pathology, and clinical medicine by Alpotus.">
    <meta name="keywords" content="medical revision, high yield notes, medical tables, USMLE step 1 review, NEET PG revision, Alpotus study hub">
    <link rel="canonical" href="https://www.alpotus.com/quick-revision.html" />

    <link rel="stylesheet" href="style.css">
    <script src="data/masterData.js"></script>
    <script src="search-engine.js"></script>
    <script src="app.js" defer></script>

    <style>
        .category-hero { padding: 120px 5% 40px 5%; background: var(--bg-card); border-bottom: 1px solid var(--border-color); text-align: center; }
        .category-hero h1 { font-size: 2.5rem; font-weight: 900; color: var(--text-main); }
        .filter-wrap { max-width: 500px; margin: 30px auto 0 auto; position: relative; }
        .filter-input { width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid var(--border-color); background: var(--bg-body); outline: none; }
    </style>
</head>
<body>

    <header class="category-hero">
        <h1>⚡ Quick <span>Revision</span></h1>
        <p>Rapid review cards and high-yield tables for medical students and exam candidates.</p>
        <div class="filter-wrap">
            <input type="text" id="localSearch" class="filter-input" placeholder="Search revision topics..." onkeyup="filterLocal()">
        </div>
    </header>

    <main class="grid-container" id="category-grid"></main>

    <script>
        function renderItems(data) {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = data.map(item => `
                <article class="card" onclick="window.location.href='${item.path}'">
                    <div style="font-size: 2.5rem; margin-bottom: 15px;">${item.icon}</div>
                    <h3>${item.name}</h3>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">${item.desc}</p>
                </article>
            `).join('');
        }
        function filterLocal() {
            const query = document.getElementById('localSearch').value.toLowerCase();
            const filtered = AlpotusData.revision.items.filter(i => i.name.toLowerCase().includes(query));
            renderItems(filtered);
        }
        window.addEventListener('load', () => renderItems(AlpotusData.revision.items));
    </script>
</body>
</html>

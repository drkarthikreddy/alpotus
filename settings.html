<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Alpotus Digital Hub</title>
    <meta name="description" content="Manage your Alpotus experience. Dark mode settings, legal information, and about CEO Sukkannagari Karthik Reddy.">
    
    <link rel="stylesheet" href="style.css">
    <script src="data/masterData.js"></script>
    <script src="search-engine.js"></script>
    <script src="app.js" defer></script>

    <style>
        body { padding-top: 90px; background: var(--bg-body); }
        .settings-container { max-width: 600px; margin: 0 auto; padding: 0 5%; }
        .settings-group { margin-bottom: 30px; }
        .group-title { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; color: var(--primary); letter-spacing: 1.5px; margin-bottom: 15px; padding-left: 10px; }
        
        .settings-list { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border-color); overflow: hidden; }
        .settings-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px 20px; border-bottom: 1px solid var(--border-color);
            cursor: pointer; transition: 0.2s; text-decoration: none; color: var(--text-main); font-weight: 600;
        }
        .settings-row:last-child { border-bottom: none; }
        .settings-row:hover { background: rgba(0,0,0,0.02); }
        
        .icon-label { display: flex; align-items: center; gap: 15px; }
        .row-arrow { color: var(--text-muted); font-size: 1.2rem; }

        /* Dark Mode Switch Styling */
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <main class="settings-container">
        <h1 style="font-weight: 900; margin-bottom: 30px;">Settings</h1>

        <!-- APPEARANCE -->
        <div class="settings-group">
            <div class="group-title">Appearance</div>
            <div class="settings-list">
                <div class="settings-row" onclick="toggleDarkMode()">
                    <div class="icon-label"><span>🌙</span> Dark Mode</div>
                    <label class="switch">
                        <input type="checkbox" id="darkTogglePage">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- ABOUT & BRAND -->
        <div class="settings-group">
            <div class="group-title">Organization</div>
            <div class="settings-list">
                <a href="about.html" class="settings-row">
                    <div class="icon-label"><span>👤</span> About Alpotus & CEO</div>
                    <div class="row-arrow">→</div>
                </a>
            </a>
        </div>

        <!-- LEGAL -->
        <div class="settings-group">
            <div class="group-title">Legal & Privacy</div>
            <div class="settings-list">
                <a href="privacy.html" class="settings-row">
                    <div class="icon-label"><span>🔒</span> Privacy Policy</div>
                    <div class="row-arrow">→</div>
                </a>
                <a href="terms.html" class="settings-row">
                    <div class="icon-label"><span>📜</span> Terms of Service</div>
                    <div class="row-arrow">→</div>
                </a>
                <a href="disclaimer.html" class="settings-row">
                    <div class="icon-label"><span>⚠️</span> Disclaimer</div>
                    <div class="row-arrow">→</div>
                </a>
            </div>
        </div>

        <div style="text-align: center; margin-top: 50px; opacity: 0.5; font-size: 0.8rem; font-weight: bold;">
            ALPOTUS v4.0.0 <br>
            CEO: Sukkannagari Karthik Reddy
        </div>
    </main>

    <script>
        // Sync the checkbox with current theme
        window.addEventListener('load', () => {
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('darkTogglePage').checked = isDark;
        });
    </script>

</body>
</html>

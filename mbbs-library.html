<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBBS Library | 19 Subject Medical Notes | Alpotus</title>
    <meta name="description" content="Access 19 standard MBBS subjects with high-yield clinical notes. Featuring Active Recall mode and one-click Anki export. Master Medicine with Alpotus.">
    
    <link rel="stylesheet" href="style.css">
    <script src="data/masterData.js"></script>
    <script src="app.js" defer></script>

    <style>
        .mbbs-hero { padding: 120px 5% 40px 5%; text-align: center; background: #fffbeb; border-bottom: 1px solid var(--border-color); }
        .mbbs-hero h1 { font-size: 2.5rem; font-weight: 900; color: var(--text-main); }
        
        /* Subject specific styling */
        .sub-card { text-align: center; padding: 30px 20px; border-radius: 20px; border: 1px solid var(--border-color); background: #fff; cursor: pointer; transition: 0.3s; }
        .sub-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--shadow); }
        .sub-icon { font-size: 3rem; margin-bottom: 15px; display: block; }
        .sub-name { font-weight: 800; font-size: 1.1rem; color: var(--text-main); }
    </style>
</head>
<body>

    <header class="mbbs-hero">
        <h1>📚 MBBS <span>Library</span></h1>
        <p>Comprehensive clinical notes for all 19 subjects with integrated memory tools.</p>
    </header>

    <main class="grid-container" id="subject-grid">
        <!-- JS will render the 19 subjects here -->
    </main>

    <script>
        window.addEventListener('load', () => {
            const grid = document.getElementById('subject-grid');
            // This pulls the 19 subjects registered in AlpotusData.mbbs.items
            grid.innerHTML = AlpotusData.mbbs.items.map(sub => `
                <div class="sub-card" onclick="window.location.href='${sub.path}'">
                    <span class="sub-icon">${sub.icon}</span>
                    <div class="sub-name">${sub.name}</div>
                    <div style="font-size:0.75rem; color:var(--text-muted); margin-top:10px;">VIEW CHAPTERS →</div>
                </div>
            `).join('');
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Articles & Tech Studies | Knowledge Hub - Alpotus</title>
    <meta name="description" content="In-depth medical articles and tech research. From Vitamin D studies to surgical procedure guides and digital note-taking workflows.">
    <link rel="stylesheet" href="style.css">
    <script src="data/masterData.js"></script>
    <script src="search-engine.js"></script>
    <script src="app.js" defer></script>
    <style>
        .category-hero { padding: 120px 5% 40px 5%; background: var(--bg-card); border-bottom: 1px solid var(--border-color); text-align: center; }
        .category-hero h1 { font-size: 2.5rem; font-weight: 900; color: var(--text-main); }
        .filter-wrap { max-width: 500px; margin: 30px auto 0 auto; position: relative; }
        .filter-input { width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid var(--border-color); background: var(--bg-body); outline: none; }
    </style>
</head>
<body>
    <header class="category-hero">
        <h1>📑 Knowledge <span>Hub</span></h1>
        <p>Scientific insights, medical research summaries, and professional guides curated by Alpotus.</p>
        <div class="filter-wrap">
            <input type="text" id="localSearch" class="filter-input" placeholder="Search articles..." onkeyup="filterLocal()">
        </div>
    </header>

    <main class="grid-container" id="category-grid"></main>

    <script>
        function renderItems(data) {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = data.map(item => `
                <article class="card" onclick="window.location.href='${item.path}'">
                    <div style="font-size: 2.5rem; margin-bottom: 15px;">${item.icon}</div>
                    <h3>${item.name}</h3>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">${item.desc}</p>
                </article>
            `).join('');
        }
        function filterLocal() {
            const query = document.getElementById('localSearch').value.toLowerCase();
            const filtered = AlpotusData.articles.items.filter(i => i.name.toLowerCase().includes(query));
            renderItems(filtered);
        }
        window.addEventListener('load', () => renderItems(AlpotusData.articles.items));
    </script>
</body>
</html>
